# Exposes RDS metrics (connections, transaction rate, table sizes, etc.)
# to Prometheus. Reuses the db-credentials Secret from Chapter 2 for v1 —
# for a real production setup, create a separate read-only monitoring
# user in Postgres instead of reusing the app's admin credentials.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: vpb-mma
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          envFrom:
            - secretRef:
                name: db-credentials
          command: ["/bin/sh", "-c"]
          args:
            - >
              export DATA_SOURCE_NAME="postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?sslmode=require";
              exec /bin/postgres_exporter
          ports:
            - name: http
              containerPort: 9187
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: vpb-mma
  labels:
    app: postgres-exporter
spec:
  selector:
    app: postgres-exporter
  ports:
    - name: http
      port: 9187
      targetPort: 9187
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: vpb-mma
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: ["vpb-mma"]
  selector:
    matchLabels:
      app: postgres-exporter
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
