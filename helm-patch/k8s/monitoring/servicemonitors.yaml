# One ServiceMonitor per microservice, telling Prometheus where to scrape
# /metrics (exposed automatically by prometheus-flask-exporter in each
# service's app.py — Chapter 3). Requires the Chapter 4 Service port to be
# named "http" — see helm-patch/service.yaml in this chapter's zip.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: web-frontend
  namespace: vpb-mma
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: ["vpb-mma"]
  selector:
    matchLabels:
      app: web-frontend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
